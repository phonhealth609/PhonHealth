<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - PCU Phon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./styles.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold mb-4">เข้าสู่ระบบเจ้าหน้าที่</h2>
            <input type="password" id="staff-pin"
                class="w-full text-center text-3xl tracking-widest p-4 border rounded-xl mb-4" placeholder="PIN"
                maxlength="4">
            <button onclick="login()"
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">ยืนยัน</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden container mx-auto p-4 max-w-6xl">

        <!-- Top Bar -->
        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow mb-6">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold text-gray-700">แผนก:</h1>
                <select id="dept-select" onchange="refreshDashboard()"
                    class="border-gray-300 border p-2 rounded-lg font-bold text-lg">
                    <option value="MED">MED - อายุรกรรม</option>
                    <option value="PED">PED - กุมารเวช</option>
                    <option value="ENT">ENT - หูคอจมูก</option>
                    <option value="DENT">DENT - ทันตกรรม</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button onclick="setDayStatus('OPEN')"
                    class="bg-green-100 text-green-700 px-4 py-2 rounded-lg font-bold hover:bg-green-200">เปิดระบบวันใหม่</button>
                <button onclick="setDayStatus('CLOSED')"
                    class="bg-red-100 text-red-700 px-4 py-2 rounded-lg font-bold hover:bg-red-200">ปิดรับคิว</button>
                <button onclick="logout()" class="text-gray-500 hover:text-gray-700 px-4">ออก</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- Left: Controls -->
            <div class="lg:col-span-1 space-y-6">

                <!-- Call Next -->
                <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-500 text-center">
                    <h2 class="text-gray-500 font-bold uppercase mb-2">คิวปัจจุบัน</h2>
                    <div id="current-q-display" class="text-6xl font-black text-blue-600 mb-4">-</div>
                    <button id="btn-call" onclick="callNext()"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-6 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
                        </svg>
                        เรียกคิวถัดไป
                    </button>
                </div>

                <!-- Walk-in -->
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h3 class="font-bold text-lg mb-4 text-gray-700">ออกตั๋ว Walk-in</h3>
                    <div class="space-y-3">
                        <input type="text" id="walkin-name" placeholder="ชื่อผู้ป่วย" class="w-full border p-2 rounded">
                        <input type="tel" id="walkin-phone" placeholder="เบอร์โทร 4 ตัวท้าย" maxlength="4"
                            class="w-full border p-2 rounded">
                        <button onclick="walkin()"
                            class="w-full bg-gray-800 text-white font-bold py-3 rounded hover:bg-black">ออกตั๋ว</button>
                    </div>
                </div>

            </div>

            <!-- Right: Queue List -->
            <div class="lg:col-span-2 bg-white rounded-2xl shadow overflow-hidden flex flex-col h-[600px]">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-gray-700">รายการคิววันนี้</h3>
                    <button onclick="refreshDashboard()" class="text-blue-500 text-sm hover:underline">Refresh</button>
                </div>
                <div class="overflow-y-auto flex-1 p-0">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 text-gray-500 text-sm sticky top-0">
                            <tr>
                                <th class="p-4">เวลาจอง</th>
                                <th class="p-4">คิวที่</th>
                                <th class="p-4">ชื่อ</th>
                                <th class="p-4">ประเภท</th>
                                <th class="p-4">สถานะ</th>
                                <th class="p-4 text-right">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="q-table" class="divide-y divide-gray-100">
                            <!-- Items -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        let pin = localStorage.getItem('staff_pin') || '';

        function login() {
            const p = document.getElementById('staff-pin').value;
            if (p) {
                pin = p;
                localStorage.setItem('staff_pin', pin);
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                refreshDashboard();
            }
        }

        function logout() {
            localStorage.removeItem('staff_pin');
            location.reload();
        }

        if (pin) login(); // Auto login if has pin

        async function refreshDashboard() {
            const dept = document.getElementById('dept-select').value;
            const res = await getAction("dashboard.summary", { dept_id: dept });

            if (res.ok) {
                document.getElementById('current-q-display').textContent = res.current_called_queue || '-';

                // Table
                const tbody = document.getElementById('q-table');
                tbody.innerHTML = '';
                if (res.last_bookings) {
                    res.last_bookings.forEach(b => {
                        let statusColor = 'text-gray-500';
                        if (b.status === 'BOOKED') statusColor = 'text-blue-600 font-bold';
                        if (b.status === 'CALLED') statusColor = 'text-green-600 font-bold animate-pulse';

                        const time = new Date(b.created_at).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50 transition">
                                <td class="p-4 text-gray-500 text-sm">${time}</td>
                                <td class="p-4 font-bold text-lg">${b.queue_no}</td>
                                <td class="p-4">${b.patient_label}</td>
                                <td class="p-4"><span class="bg-gray-200 text-xs px-2 py-1 rounded">${b.source}</span></td>
                                <td class="p-4 ${statusColor}">${b.status}</td>
                                <td class="p-4 text-right">
                                    ${b.status !== 'SERVED' ? `<button onclick="markServed('${b.queue_id}')" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200">จบงาน</button>` : '<span class="text-green-500">✓</span>'}
                                </td>
                            </tr>
                        `;
                    });
                }
            }
        }

        async function callNext() {
            if (!confirm('ยืนยันเรียกคิวถัดไป?')) return;
            const dept = document.getElementById('dept-select').value;
            const btn = document.getElementById('btn-call');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            const res = await postAction("queue.callNext", { dept_id: dept, staff_pin: pin });

            btn.disabled = false;
            btn.classList.remove('opacity-50');

            if (res.ok) {
                refreshDashboard();
                // alert('เรียกคิว ' + res.called_queue_no);
            } else {
                alert('Error: ' + res.error);
            }
        }

        async function walkin() {
            const dept = document.getElementById('dept-select').value;
            const name = document.getElementById('walkin-name').value;
            const phone = document.getElementById('walkin-phone').value;
            if (!name || !phone) return alert('กรอกข้อมูลให้ครบ');

            const res = await postAction("queue.walkin", {
                dept_id: dept, staff_pin: pin,
                patient_label: name, phone_last4: phone
            });

            if (res.ok) {
                alert('ออกคิวสำเร็จ: ' + res.queue_no);
                document.getElementById('walkin-name').value = '';
                document.getElementById('walkin-phone').value = '';
                refreshDashboard();
            } else {
                alert(res.error);
            }
        }

        async function setDayStatus(status) {
            if (!confirm(`ยืนยันเปลี่ยนสถานะเป็น ${status}?`)) return;
            const action = status === 'OPEN' ? 'day.open' : 'day.close';
            await postAction(action, { staff_pin: pin });
            alert('OK');
        }

        async function markServed(qId) {
            const res = await postAction("queue.markServed", { queue_id: qId, staff_pin: pin });
            if (res.ok) {
                refreshDashboard();
            } else {
                alert('Error: ' + res.error);
            }
        }

        // Auto refresh
        setInterval(refreshDashboard, 5000);

    </script>
</body>

</html>

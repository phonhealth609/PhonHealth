<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display - PCU Phon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./styles.css" rel="stylesheet">
    <script>
        // Custom Tailwind config for extra large sizes
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        'huge': '12rem',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="bg-blue-800 p-4 flex justify-between items-center shadow-lg z-10">
        <div>
            <h1 class="text-3xl font-bold tracking-wider">🏥 PCU Phon Queue Display</h1>
            <p class="text-blue-300 text-lg" id="dept-name">Loading...</p>
        </div>
        <div class="text-right">
            <h2 id="clock" class="text-4xl font-mono font-bold">00:00:00</h2>
            <p id="date" class="text-blue-200">...</p>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex p-4 gap-4">

        <!-- Left: Current Call (Big) -->
        <div
            class="w-2/3 bg-white rounded-3xl shadow-2xl flex flex-col items-center justify-center text-gray-900 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full bg-blue-600 text-white text-center py-4">
                <h2 class="text-5xl font-bold uppercase">เชิญหมายเลข</h2>
            </div>

            <div class="flex-1 flex items-center justify-center">
                <div id="current-q" class="text-huge font-black tracking-tighter text-blue-600 animate-pulse-slow">
                    ...
                </div>
            </div>

            <div class="absolute bottom-0 w-full bg-gray-100 flex py-6 border-t border-gray-300">
                <div class="w-1/2 text-center border-r border-gray-300">
                    <p class="text-gray-500 text-xl font-bold">สถานะ</p>
                    <p class="text-4xl font-bold text-green-600">กำลังเรียก</p>
                </div>
                <div class="w-1/2 text-center">
                    <p class="text-gray-500 text-xl font-bold">โต๊ะตรวจที่</p>
                    <p class="text-4xl font-bold text-gray-800">1</p>
                </div>
            </div>
        </div>

        <!-- Right: List -->
        <div class="w-1/3 flex flex-col gap-4">

            <!-- Next Queues -->
            <div class="bg-gray-800 rounded-3xl shadow-lg p-6 flex-1 border border-gray-700">
                <h3 class="text-2xl font-bold text-yellow-400 mb-4 border-b border-gray-600 pb-2">คิวถัดไป</h3>
                <div id="next-list" class="space-y-4">
                    <!-- Items -->
                    <div class="flex justify-between items-center bg-gray-700 p-4 rounded-xl">
                        <span class="text-3xl font-bold text-gray-300">A-002</span>
                        <span class="text-gray-400">รอเรียก</span>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div
                class="bg-blue-900 rounded-3xl shadow-lg p-6 h-1/4 flex items-center justify-around border border-blue-700">
                <div class="text-center">
                    <p class="text-blue-300 text-sm uppercase">คิวทั้งหมด</p>
                    <p id="total-booked" class="text-4xl font-bold text-white">0</p>
                </div>
                <div class="text-center">
                    <p class="text-green-300 text-sm uppercase">รับบริการแล้ว</p>
                    <p id="total-served" class="text-4xl font-bold text-white">0</p>
                </div>
            </div>

        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deptId = urlParams.get('dept_id') || 'MED'; // Default

        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('th-TH');
            document.getElementById('date').textContent = now.toLocaleDateString('th-TH', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }, 1000);

        // Fetch Loop
        async function updateDisplay() {
            const res = await getAction("dashboard.summary", { dept_id: deptId });
            if (res.ok) {
                document.getElementById('dept-name').textContent = res.dept_name || deptId;

                // Current Queue
                const currentQ = res.current_called_queue || '-';
                const el = document.getElementById('current-q');
                if (el.textContent.trim() !== currentQ) {
                    // New queue called - maybe play sound here in future
                    el.classList.remove('animate-pulse-slow');
                    void el.offsetWidth; // trigger reflow
                    el.classList.add('animate-pulse-slow');
                }
                el.textContent = currentQ;

                // Next List
                const listEl = document.getElementById('next-list');
                listEl.innerHTML = '';
                if (res.next_list && res.next_list.length > 0) {
                    res.next_list.forEach(q => {
                        listEl.innerHTML += `
                            <div class="flex justify-between items-center bg-gray-700 p-3 rounded-xl">
                                <span class="text-3xl font-bold text-gray-300">${q}</span>
                                <span class="text-gray-400 text-sm">รอเรียก</span>
                            </div>
                        `;
                    });
                } else {
                    listEl.innerHTML = `<p class="text-gray-500 text-center mt-10">ไม่มีคิวรอ</p>`;
                }

                // Stats
                document.getElementById('total-booked').textContent = res.totals.booked;
                document.getElementById('total-served').textContent = res.totals.served;
            }
        }

        setInterval(updateDisplay, 3000);
        updateDisplay();
    </script>
</body>

</html>
